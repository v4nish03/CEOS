version: '3.9'
services:
  postgres:
    image: postgres:16-alpine
    container_name: ceos-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ceos
      POSTGRES_USER: ceos
      POSTGRES_PASSWORD: ceos
    ports:
      - "5432:5432"
    volumes:
      - ceos_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ceos -d ceos"]
      interval: 5s
      timeout: 5s
      retries: 20

volumes:
  ceos_pg_data:
